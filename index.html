<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLH Digital Systems</title>

<style>
/* Estilo básico */
.grid-container {
  display: grid;
  grid-template-columns: 200px 1fr;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

.header {
  grid-column: 1 / 3;
  background: #0a5cff;
  color: white;
  padding: 15px;
  text-align: center;
}

.sidebar {
  grid-row: 2 / 3;
  background: #f4f4f4;
  padding: 20px;
}

.content {
  grid-row: 2 / 3;
  padding: 20px;
}

.footer {
  grid-column: 1 / 3;
  background: black;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>

</head>

<body>

<div class="grid-container">

<div class="header">
<h1>LLH Digital Systems</h1>
<p>Tecnología Avanzada, Soluciones Digitales</p>
</div>

<div class="sidebar">
<h3>Menú</h3>
<p>💻 Laptops</p>
<p>🖥 Computadoras</p>
<p>🖨 Impresoras</p>
</div>

<div class="content">
<h2>Bienvenido</h2>
<p>Construyendo el mañana, hoy: el futuro está aquí</p>
</div>

<div class="footer">
📍 Ayacucho - Perú
</div>

</div>

</body>
</html>
